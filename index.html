<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumBlog Ultra | Cloud Connected Social Engine</title>
    <!-- Include the Supabase CDN Client Library -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --heart: #ef4444;
            --green: #22c55e;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #0284c7;
            --accent-hover: #0369a1;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        button:hover { background-color: var(--accent-hover); }

        .theme-btn {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 0.375rem;
            font-size: 1rem;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-primary);
            border: 1px dashed var(--border);
            border-radius: 0.375rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        textarea { height: 100px; resize: vertical; }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .post-content {
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }

        .media-container img, .media-container video {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            border: 1px solid var(--border);
        }

        .social-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-top: 1rem;
        }

        .social-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            padding: 0.4rem 0.8rem;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .social-btn:hover {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .comment-section {
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .comment-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .comment-input {
            flex: 1;
            padding: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 0.375rem;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .comment-item {
            background-color: var(--bg-primary);
            padding: 0.6rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent);
        }

        .comment-author {
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.15rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>QuantumBlog // Global Cloud Engine</h1>
            <button class="theme-btn" onclick="toggleTheme()">🌓 Toggle Mode</button>
        </header>

        <div class="grid">
            <!-- Left Column: Global Social Feed -->
            <main>
                <h2>Live Global Social Feed</h2>
                <div id="blog-feed" style="margin-top: 1rem;"></div>
            </main>

            <!-- Right Column: Dashboard Posting Control -->
            <aside>
                <div class="card">
                    <h3>Broadcast to World</h3>
                    <form id="blog-form" onsubmit="handlePublish(event)" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label for="title">Post Title</label>
                            <input type="text" id="title" required placeholder="What's breaking tech today?">
                        </div>
                        
                        <div class="form-group">
                            <label for="author">Author Handle</label>
                            <input type="text" id="author" required placeholder="@developer_name">
                        </div>
                        
                        <div class="form-group">
                            <label for="content">Article Content</label>
                            <textarea id="content" required placeholder="Type your narrative thread here..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="media-file">Attach Compressed Image/Video (Max 1MB for Free Tier)</label>
                            <input type="file" id="media-file" accept="image/*,video/*">
                        </div>
                        
                        <button type="submit" id="submit-btn" style="width: 100%;">Broadcast Post Globally</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // REPLACE THESE WITH YOUR COPIED SUPABASE PROJECT CREDENTIALS
        const SUPABASE_URL = "https://itifyjkjbcqsxfcuolrq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_1S2XJVfaF96dVRmVwqqVMA_mHC_rd2b";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let posts = [];

        // Fetch Data from Global Serverless Cluster
        async function fetchGlobalFeed() {
            const { data, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Database connection failure:", error);
                return;
            }
            posts = data || [];
            renderFeed();
        }

        // Render Database Records to Viewport Layout
        function renderFeed() {
            const feed = document.getElementById('blog-feed');
            if (posts.length === 0) {
                feed.innerHTML = '<div class="empty-state">No dynamic broadcasts available. Initiate the global sequence!</div>';
                return;
            }

            feed.innerHTML = posts.map(post => {
                let mediaHtml = '';
                if (post.media) {
                    if (post.media_type.startsWith('image/')) {
                        mediaHtml = `<div class="media-container"><img src="${post.media}" alt="Global Media"></div>`;
                    } else if (post.media_type.startsWith('video/')) {
                        mediaHtml = `<div class="media-container"><video src="${post.media}" controls></video></div>`;
                    }
                }

                let commentsList = [];
                try {
                    commentsList = typeof post.comments === 'string' ? JSON.parse(post.comments) : (post.comments || []);
                } catch(e) { commentsList = []; }

                const commentsHtml = commentsList.map(c => `
                    <div class="comment-item">
                        <div class="comment-author">${escapeHTML(c.author)}</div>
                        <div>${escapeHTML(c.text)}</div>
                    </div>
                `).join('');

                const dateString = new Date(post.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                return `
                    <article class="card" id="post-${post.id}">
                        <h2>${escapeHTML(post.title)}</h2>
                        <div class="post-meta">Broadcast by <strong>${escapeHTML(post.author)}</strong> on ${dateString}</div>
                        <div class="post-content">${escapeHTML(post.content)}</div>
                        
                        ${mediaHtml}

                        <!-- Dynamic Cloud Interactions -->
                        <div class="social-bar">
                            <button class="social-btn" onclick="interact('${post.id}', 'like', ${post.likes || 0})">
                                👍 <span>${post.likes || 0}</span>
                            </button>
                            <button class="social-btn" onclick="interact('${post.id}', 'dislike', ${post.dislikes || 0})">
                                👎 <span>${post.dislikes || 0}</span>
                            </button>
                        </div>

                        <!-- Real-time Nested Global Comments -->
                        <div class="comment-section">
                            <form class="comment-form" onsubmit="addComment(event, '${post.id}')">
                                <input type="text" placeholder="Write a global comment..." required class="comment-input">
                                <button type="submit" style="padding: 0.4rem 1rem;">Reply</button>
                            </form>
                            <div class="comment-list">${commentsHtml}</div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Form Submit Handler
        function handlePublish(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;
            const fileInput = document.getElementById('media-file');
            const file = fileInput.files;

            if (file) {
                const reader = new FileReader();
                reader.onload = async function(event) {
                    await sendToCloud(title, author, content, event.target.result, file.type);
                };
                reader.readAsDataURL(file);
            } else {
                sendToCloud(title, author, content, null, null);
            }
        }

        // Send Captured Package to Cloud Architecture
        async function sendToCloud(title, author, content, mediaData, mediaType) {
            const newPost = {
                id: 'post-' + Date.now().toString() + '-' + Math.random().toString(36).substr(2, 5),
                title: title,
                author: author,
                content: content,
                media: mediaData,
                media_type: mediaType,
                likes: 0,
                dislikes: 0,
                reposts: 0,
                comments: []
            };

            const { error } = await supabase.from('posts').insert([newPost]);
            if (error) {
                alert("Cloud submission error. Keep file sizes small!");
                console.error(error);
            } else {
                resetForm();
                await fetchGlobalFeed();
            }
        }

        // Update Cloud Counter States
        async function interact(id, action, currentVal) {
            const updateData = {};
            updateData[action === 'like' ? 'likes' : 'dislikes'] = currentVal + 1;

            const { error } = await supabase.from('posts').update(updateData).eq('id', id);
            if (!error) await fetchGlobalFeed();
        }

        // Append Global Nested Comments String
        async function addComment(e, postId) {
            e.preventDefault();
            const form = e.target;
            const input = form.querySelector('.comment-input');
            const commentText = input.value.trim();
            if (!commentText) return;

            const post = posts.find(p => p.id === postId);
            if (!post) return;

            let currentComments = [];
            try {
                currentComments = typeof post.comments === 'string' ? JSON.parse(post.comments) : (post.comments || []);
            } catch(err) { currentComments = []; }

            currentComments.push({ author: '@GlobalReader', text: commentText });

            const { error } = await supabase.from('posts').update({ comments: currentComments }).eq('id', postId);
            if (!error) {
                input.value = '';
                await fetchGlobalFeed();
            }
        }

        // Auxiliary Control Scripts
        function resetForm() { document.getElementById('blog-form').reset(); }
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('quantumblog_social_theme', target);
        }

        const savedTheme = localStorage.getItem('quantumblog_social_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Polling loop to fetch new logs automatically every 5 seconds
        fetchGlobalFeed();
        setInterval(fetchGlobalFeed, 5000);
    </script>
</body>
</html>
