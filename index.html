<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumBlog Ultra | Dynamic Social Engine</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --heart: #ef4444;
            --green: #22c55e;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #0284c7;
            --accent-hover: #0369a1;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        button:hover { background-color: var(--accent-hover); }

        .theme-btn {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 0.375rem;
            font-size: 1rem;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-primary);
            border: 1px dashed var(--border);
            border-radius: 0.375rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        textarea { height: 100px; resize: vertical; }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .repost-tag {
            display: inline-block;
            font-size: 0.75rem;
            background-color: var(--border);
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .post-content {
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }

        .media-container img, .media-container video {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            border: 1px solid var(--border);
        }

        /* Social Interactive Row */
        .social-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-top: 1rem;
        }

        .social-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            padding: 0.4rem 0.8rem;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .social-btn:hover {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .social-btn.active-like { color: var(--heart); }
        .social-btn.active-dislike { color: #f97316; }
        .social-btn.active-repost { color: var(--green); }

        /* Comment Engine Box */
        .comment-section {
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .comment-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .comment-input {
            flex: 1;
            padding: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 0.375rem;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .comment-item {
            background-color: var(--bg-primary);
            padding: 0.6rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent);
        }

        .comment-author {
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.15rem;
        }

        .admin-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-delete { background-color: #ef4444; }
        .btn-delete:hover { background-color: #dc2626; }
        .btn-edit { background-color: var(--border); color: var(--text-primary); }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>QuantumBlog // Social Engine</h1>
            <button class="theme-btn" onclick="toggleTheme()">模 Mode Toggle</button>
        </header>

        <div class="grid">
            <!-- Left Column: Social Feed -->
            <main>
                <h2>Live Social Feed</h2>
                <div id="blog-feed" style="margin-top: 1rem;"></div>
            </main>

            <!-- Right Column: Dashboard Posting Control -->
            <aside>
                <div class="card">
                    <h3>Compose Article</h3>
                    <form id="blog-form" onsubmit="handlePublish(event)" style="margin-top: 1rem;">
                        <input type="hidden" id="post-id">
                        
                        <div class="form-group">
                            <label for="title">Post Title</label>
                            <input type="text" id="title" required placeholder="What's breaking tech today?">
                        </div>
                        
                        <div class="form-group">
                            <label for="author">Author Handle</label>
                            <input type="text" id="author" required placeholder="@developer_name">
                        </div>
                        
                        <div class="form-group">
                            <label for="content">Article Content</label>
                            <textarea id="content" required placeholder="Type your narrative thread here..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="media-file">Attach Gallery Media (Photo / Video)</label>
                            <input type="file" id="media-file" accept="image/*,video/*">
                        </div>
                        
                        <button type="submit" id="submit-btn" style="width: 100%;">Broadcast Post</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Core System Array Hydration
        let posts = JSON.parse(localStorage.getItem('quantumblog_social_posts')) || [];

        // Seed initial elegant mock profile post if empty
        if (posts.length === 0) {
            posts = [{
                id: 'seed-1',
                title: 'The Browser-Only Full-Stack Revolution',
                author: '@QuantumArchitecture',
                content: 'This card features an integrated system holding metrics for likes, dislikes, independent user text comment threads, and system repost replications running without database lag loops.',
                media: null,
                mediaType: null,
                date: 'May 21, 2026',
                likes: 42,
                dislikes: 1,
                reposts: 7,
                comments: [{ author: '@TechInnovator', text: 'This single layout structure is brilliant!' }],
                isReposted: false
            }];
            savePosts();
        }

        // Render Dynamic Feed Loop
        function renderFeed() {
            const feed = document.getElementById('blog-feed');
            if (posts.length === 0) {
                feed.innerHTML = '<div class="empty-state">No dynamic broadcasts available. Initiate the sequence!</div>';
                return;
            }

            feed.innerHTML = posts.map(post => {
                // Media Processor
                let mediaHtml = '';
                if (post.media) {
                    if (post.mediaType.startsWith('image/')) {
                        mediaHtml = `<div class="media-container"><img src="${post.media}" alt="Feed Media"></div>`;
                    } else if (post.mediaType.startsWith('video/')) {
                        mediaHtml = `<div class="media-container"><video src="${post.media}" controls></video></div>`;
                    }
                }

                // Comment String Generator
                const commentsHtml = post.comments.map(c => `
                    <div class="comment-item">
                        <div class="comment-author">${escapeHTML(c.author)}</div>
                        <div>${escapeHTML(c.text)}</div>
                    </div>
                `).join('');

                return `
                    <article class="card" id="post-${post.id}">
                        ${post.isReposted ? `<div class="repost-tag">🔄 Reposted Thread</div>` : ''}
                        <h2>${escapeHTML(post.title)}</h2>
                        <div class="post-meta">Broadcast by <strong>${escapeHTML(post.author)}</strong> on ${post.date}</div>
                        <div class="post-content">${escapeHTML(post.content)}</div>
                        
                        ${mediaHtml}

                        <!-- Dynamic Interactions Bar -->
                        <div class="social-bar">
                            <button class="social-btn" onclick="interact('${post.id}', 'like')">
                                👍 <span>${post.likes || 0}</span>
                            </button>
                            <button class="social-btn" onclick="interact('${post.id}', 'dislike')">
                                👎 <span>${post.dislikes || 0}</span>
                            </button>
                            <button class="social-btn" onclick="interact('${post.id}', 'repost')">
                                🔄 <span>${post.reposts || 0}</span>
                            </button>
                        </div>

                        <!-- Localized Component Comment Thread -->
                        <div class="comment-section">
                            <form class="comment-form" onsubmit="addComment(event, '${post.id}')">
                                <input type="text" placeholder="Write an anonymous comment..." required class="comment-input">
                                <button type="submit" style="padding: 0.4rem 1rem;">Reply</button>
                            </form>
                            <div class="comment-list">${commentsHtml}</div>
                        </div>

                        <!-- Content Operations Management -->
                        <div class="admin-actions">
                            <button class="btn-edit" onclick="editPost('${post.id}')">Modify Text</button>
                            <button class="btn-delete" onclick="deletePost('${post.id}')">Delete</button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Broadcaster Form Handler
        function handlePublish(e) {
            e.preventDefault();
            const idInput = document.getElementById('post-id').value;
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;
            const fileInput = document.getElementById('media-file');
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    executeSave(idInput, title, author, content, event.target.result, file.type);
                };
                reader.readAsDataURL(file);
            } else {
                let existingMedia = null;
                let existingMediaType = null;
                if (idInput) {
                    const oldPost = posts.find(p => p.id === idInput);
                    if (oldPost) {
                        existingMedia = oldPost.media;
                        existingMediaType = oldPost.mediaType;
                    }
                }
                executeSave(idInput, title, author, content, existingMedia, existingMediaType);
            }
        }

        // Database Injection Save Controller
        function executeSave(id, title, author, content, mediaData, mediaType) {
            if (id) {
                const index = posts.findIndex(p => p.id === id);
                if (index !== -1) {
                    posts[index].title = title;
                    posts[index].author = author;
                    posts[index].content = content;
                    posts[index].media = mediaData;
                    posts[index].mediaType = mediaType;
                }
            } else {
                const newPost = {
                    id: 'post-' + Date.now().toString(),
                    title: title,
                    author: author,
                    content: content,
                    media: mediaData,
                    mediaType: mediaType,
                    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                    likes: 0,
                    dislikes: 0,
                    reposts: 0,
                    comments: [],
                    isReposted: false
                };
                posts.unshift(newPost);
            }

            try {
                savePosts();
                renderFeed();
                resetForm();
            } catch (err) {
                alert("Storage Overflow: Image file sizes are too large for localized engine structures. Try a compressed image file.");
            }
        }

        // Interactions Tracking Logic Module
        function interact(id, action) {
            const index = posts.findIndex(p => p.id === id);
            if (index === -1) return;

            if (action === 'like') posts[index].likes = (posts[index].likes || 0) + 1;
            if (action === 'dislike') posts[index].dislikes = (posts[index].dislikes || 0) + 1;
            
            if (action === 'repost') {
                posts[index].reposts = (posts[index].reposts || 0) + 1;
                // Create a clone item and inject back to feed layout 
                const clonedRepost = {
                    ...posts[index],
                    id: 'repost-' + Date.now().toString(),
                    isReposted: true,
                    likes: 0,
                    dislikes: 0,
                    reposts: 0,
                    comments: []
                };
                posts.unshift(clonedRepost);
            }

            savePosts();
            renderFeed();
        }

        // Dynamic Comments Module
        function addComment(e, postId) {
            e.preventDefault();
            const form = e.target;
            const input = form.querySelector('.comment-input');
            const commentText = input.value.trim();
            
            const index = posts.findIndex(p => p.id === postId);
            if (index === -1 || !commentText) return;

            posts[index].comments.push({
                author: '@AnonymousUser',
                text: commentText
            });

            savePosts();
            renderFeed();
            input.value = '';
        }

        // System Configuration Tools
        function editPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;
            document.getElementById('post-id').value = post.id;
            document.getElementById('title').value = post.title;
            document.getElementById('author').value = post.author;
            document.getElementById('content').value = post.content;
            document.getElementById('submit-btn').innerText = 'Modify Broadcast';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deletePost(id) {
            if (confirm('Permanently wipe this entry record?')) {
                posts = posts.filter(p => p.id !== id);
                savePosts();
                renderFeed();
                resetForm();
            }
        }

        function savePosts() { localStorage.setItem('quantumblog_social_posts', JSON.stringify(posts)); }
        function resetForm() {
            document.getElementById('blog-form').reset();
            document.getElementById('post-id').value = '';
            document.getElementById('submit-btn').innerText = 'Broadcast Post';
        }
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('quantumblog_social_theme', target);
        }

        const savedTheme = localStorage.getItem('quantumblog_social_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        renderFeed();
    </script>
</body>
</html>
