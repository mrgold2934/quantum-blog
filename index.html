<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumBlog Ultra | Cloud Connected Social Engine</title>
    <!-- Fallback CDN links to ensure the database script loads successfully -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
            --heart: #ef4444;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #0284c7;
            --accent-hover: #0369a1;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        button:hover { background-color: var(--accent-hover); }

        .theme-btn {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1.25rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 0.375rem;
            font-size: 1rem;
        }

        input[type="file"] {
            display: block;
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-primary);
            border: 1px dashed var(--border);
            border-radius: 0.375rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        textarea { height: 100px; resize: vertical; }

        .post-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .post-content {
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }

        .media-container img, .media-container video {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            border: 1px solid var(--border);
        }

        .social-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-top: 1rem;
        }

        .social-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid transparent;
            padding: 0.4rem 0.8rem;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .social-btn:hover {
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }

        .comment-section {
            margin-top: 1rem;
            padding-top: 1rem;
        }

        .comment-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .comment-input {
            flex: 1;
            padding: 0.5rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 0.375rem;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .comment-item {
            background-color: var(--bg-primary);
            padding: 0.6rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            border-left: 3px solid var(--accent);
        }

        .comment-author {
            font-weight: bold;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.15rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 3rem 0;
        }

        .error-shield {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

        <header>
            <h1>QuantumBlog // Global Cloud Engine</h1>
            <button class="theme-btn" onclick="toggleTheme()">🌓 Toggle Mode</button>
        </header>

        <div class="grid">

            <main>
                <h2>Live Global Social Feed</h2>
                <div id="blog-feed" style="margin-top: 1rem;"></div>

                            <input type="text" id="title" required placeholder="What's breaking tech today?">

                        <div class="form-group">
                            <label for="author">Author Handle</label>
                            <input type="text" id="author" required placeholder="@developer_name">
                        </div>
                        
                        <div class="form-group">
                            <label for="content">Article Content</label>
                            <textarea id="content" required placeholder="Type your narrative thread here..."></textarea>

                            <label for="media-file">Attach Compressed Image/Video (Max 1MB for Free Tier)</label>

                        </div>
                        
                        <button type="submit" id="submit-btn" style="width: 100%;">Broadcast Post Globally</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>
