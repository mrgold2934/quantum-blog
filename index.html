<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumBlog Global Feed</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); padding: 2rem; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { padding-bottom: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
        h1 { background: linear-gradient(to right, var(--accent), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 2rem; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card { background-color: var(--bg-secondary); border: 1px solid var(--border); padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 0.75rem; background-color: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 0.375rem; font-size: 1rem; }
        textarea { height: 100px; resize: vertical; }
        button { background-color: var(--accent); color: #fff; border: none; padding: 0.7rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-weight: bold; width: 100%; }
        .post-meta { font-size: 0.85rem; color: var(--text-secondary); margin: 0.5rem 0 1rem 0; }
        .post-content { line-height: 1.6; white-space: pre-wrap; }
        .social-bar { display: flex; gap: 1rem; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
        .social-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); width: auto; padding: 0.4rem 0.8rem; }
        .comment-section { margin-top: 1rem; padding-top: 1rem; }
        .comment-form { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
        .comment-input { flex: 1; padding: 0.5rem; background: var(--bg-primary); border: 1px solid var(--border); color: #fff; border-radius: 0.25rem; }
        .comment-btn { width: auto; padding: 0.5rem 1rem; }
        .comment-item { background: var(--bg-primary); padding: 0.5rem; border-radius: 0.25rem; margin-bottom: 0.4rem; font-size: 0.9rem; border-left: 3px solid var(--accent); }
        .comment-author { font-weight: bold; color: var(--text-secondary); font-size: 0.8rem; }
        .empty-state { text-align: center; color: var(--text-secondary); padding: 2rem 0; }
        .status-box { padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>QuantumBlog // Global Cloud Engine</h1>
        </header>

        <!-- Status display alert container -->
        <div id="status-display" class="status-box"></div>

        <div class="grid">
            <main>
                <h2>Live Global Social Feed</h2>
                <div id="blog-feed" style="margin-top: 1rem;">
                    <div class="empty-state">Connecting to global cloud database...</div>
                </div>
            </main>

            <aside>
                <div class="card">
                    <h3>Broadcast to World</h3>
                    <form id="blog-form" onsubmit="handlePublish(event)" style="margin-top: 1rem;">
                        <div class="form-group">
                            <label>Post Title</label>
                            <input type="text" id="title" required placeholder="What's breaking tech today?">
                        </div>
                        <div class="form-group">
                            <label>Author Handle</label>
                            <input type="text" id="author" required placeholder="@developer_name">
                        </div>
                        <div class="form-group">
                            <label>Article Content</label>
                            <textarea id="id-content" required placeholder="Type your story here..."></textarea>
                        </div>
                        <button type="submit">Broadcast Post Globally</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://itifyjkjbcqsxfcuolrq.supabase.co";
        
        // ⚠️ VITAL: MAKE SURE YOUR TOTAL LONG ANON KEY IS INSIDE THESE QUOTES:
        const SUPABASE_ANON_KEY = "sb_publishable_1S2XJVfaF96dVRmVwqqVMA_mHC_rd2b"; 

        let supabaseCtx = null;
        let globalPosts = [];

        function showStatus(msg, isError) {
            const box = document.getElementById('status-display');
            box.style.display = 'block';
            box.style.background = isError ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)';
            box.style.borderColor = isError ? '#ef4444' : '#22c55e';
            box.style.color = isError ? '#fca5a5' : '#bbf7d0';
            box.style.borderStyle = 'solid';
            box.style.borderWidth = '1px';
            box.innerHTML = msg;
        }

        function initSystem() {
            if (!window.supabase) {
                showStatus("<strong>🚫 Library Error:</strong> The Supabase file completely failed to download to your computer. Try using a mobile network hotspot.", true);
                return false;
            }
            if (SUPABASE_ANON_KEY === "YOUR_SUPABASE_ANON_KEY" || SUPABASE_ANON_KEY.trim() === "") {
                showStatus("<strong>🔑 Key Missing:</strong> You forgot to paste your long Supabase anon key string into line 101 of your code file!", true);
                return false;
            }
            try {
                supabaseCtx = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                return true;
            } catch (err) {
                showStatus("<strong>⚠️ Client Crash:</strong> " + err.message, true);
                return false;
            }
        }

        async function fetchFeed() {
            if (!supabaseCtx) return;
            
            // Added defensive wrapper block to visually catch any secret network response rejections
            try {
                const response = await supabaseCtx.from('posts').select('*').order('created_at', { ascending: false });
                
                if (response.error) {
                    showStatus("<strong>❌ Database Configuration Error:</strong> " + response.error.message + "<br><br><em>Action Required: Ensure you successfully hit the green 'Run' button inside your Supabase SQL window!</em>", true);
                    return;
                }
                
                // Clear any error alert window upon successful download connection
                document.getElementById('status-display').style.display = 'none';
                globalPosts = response.data || [];
                renderUI();
            } catch (crashError) {
                showStatus("<strong>💥 Critical Network Crash:</strong> The API key you pasted is broken or formatted incorrectly. Re-copy the exact 'anon/public' key from Supabase settings.", true);
            }
        }

        function renderUI() {
            const feed = document.getElementById('blog-feed');
            if (globalPosts.length === 0) {
                feed.innerHTML = '<div class="empty-state">No posts in cloud yet. Be the first to type something and post!</div>';
                return;
            }

            let html = '';
            for (let i = 0; i < globalPosts.length; i++) {
                let p = globalPosts[i];
                let list = [];
                try { list = typeof p.comments === 'string' ? JSON.parse(p.comments) : (p.comments || []); } catch(e) { list = []; }

                let cHtml = '';
                for (let j = 0; j < list.length; j++) {
                    cHtml += '<div class="comment-item"><div class="comment-author">' + cleanText(list[j].author) + '</div><div>' + cleanText(list[j].text) + '</div></div>';
                }

                html += '<article class="card">' +
                    '<h2>' + cleanText(p.title) + '</h2>' +
                    '<div class="post-meta">By <strong>' + cleanText(p.author) + '</strong></div>' +
                    '<div class="post-content">' + cleanText(p.content) + '</div>' +
                    '<div class="social-bar">' +
                        '<button class="social-btn" onclick="addVote(\'' + p.id + '\',\'likes\',' + (p.likes||0) + ')">👍 ' + (p.likes||0) + '</button>' +
                        '<button class="social-btn" onclick="addVote(\'' + p.id + '\',\'dislikes\',' + (p.dislikes||0) + ')">👎 ' + (p.dislikes||0) + '</button>' +
                    '</div>' +
                    '<div class="comment-section">' +
                        '<form class="comment-form" onsubmit="postComment(event,\'' + p.id + '\')">' +
                            '<input type="text" placeholder="Write a reply..." required class="comment-input">' +
                            '<button type="submit" class="comment-btn">Reply</button>' +
                        '</form>' +
                        '<div>' + cHtml + '</div>' +
                    '</div>' +
                '</article>';
            }
            feed.innerHTML = html;
        }

        async function handlePublish(e) {
            e.preventDefault();
